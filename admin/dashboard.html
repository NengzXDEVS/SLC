<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Management Dashboard - UCPB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .image-preview {
            width: 100%;
            height: 180px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .image-preview.loading {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .image-info {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .image-url {
            font-size: 12px;
            color: #999;
            word-break: break-all;
            margin-bottom: 10px;
        }

        .image-description {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .quality-control {
            margin-bottom: 15px;
        }

        .quality-control label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .quality-control input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .quality-value {
            font-weight: bold;
            color: #667eea;
        }

        .image-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-downloaded {
            background: #d4f4dd;
            color: #22863a;
        }

        .status-pending {
            background: #fef5e7;
            color: #7d6608;
        }

        .status-error {
            background: #fadbd8;
            color: #78281f;
        }

        .image-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .image-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            margin-top: -10px;
        }

        .modal-close:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .modal-actions button {
            flex: 1;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            animation: slideInDown 0.3s ease;
        }

        @keyframes slideInDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: #d4f4dd;
            color: #22863a;
            border: 1px solid #9fdbaf;
        }

        .alert-error {
            background: #fadbd8;
            color: #78281f;
            border: 1px solid #f5b7b1;
        }

        .alert-info {
            background: #d5e8f5;
            color: #0c3454;
            border: 1px solid #85c1e2;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-images {
            background: white;
            padding: 60px 20px;
            border-radius: 10px;
            text-align: center;
            color: #999;
        }

        .no-images h3 {
            margin-bottom: 10px;
            color: #666;
        }

        @media (max-width: 768px) {
            .images-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                order: -1;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Image Management Dashboard</h1>
            <p>Manage, track, and optimize all images on your website</p>
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalImages">0</div>
                    <div class="stat-label">Total Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="downloadedImages">0</div>
                    <div class="stat-label">Downloaded</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingImages">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalSize">0</div>
                    <div class="stat-label">Total Size</div>
                </div>
            </div>
        </div>

        <div id="alerts"></div>

        <div class="controls">
            <button class="btn-primary" onclick="showExtractModal()">
                📥 Extract Images from HTML
            </button>
            <button class="btn-success" onclick="downloadAllPending()">
                ⬇️ Download All Pending
            </button>
            <button class="btn-secondary" onclick="refreshDashboard()">
                🔄 Refresh
            </button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by URL, description, or element..." onkeyup="filterImages()">
            </div>
        </div>

        <div id="imagesList"></div>
    </div>

    <!-- Extract Modal -->
    <div id="extractModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('extractModal')">&times;</button>
            <div class="modal-header">Extract Images from HTML</div>
            <div class="form-group">
                <label>Select HTML File:</label>
                <select id="htmlFile" onchange="extractImages()">
                    <option value="">-- Select a file --</option>
                    <option value="index.html">index.html</option>
                </select>
            </div>
            <div id="extractResult"></div>
        </div>
    </div>

    <!-- Edit Image Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            <div class="modal-header">Edit Image</div>
            <form id="editForm">
                <div class="form-group">
                    <label>Image URL:</label>
                    <input type="text" id="editSrcUrl" readonly>
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="editDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Compression Quality (1-100):</label>
                    <input type="range" id="editQuality" min="1" max="100" oninput="updateQualityDisplay()">
                    <div style="margin-top: 8px;">
                        Quality: <span id="qualityDisplay">80</span>%
                    </div>
                </div>
                <div id="previewContainer" style="margin-bottom: 20px;">
                    <img id="previewImage" style="max-width: 100%; border-radius: 6px;" alt="Preview">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('editModal')">Cancel</button>
                    <button type="button" class="btn-primary" id="downloadBtn" onclick="downloadImage()">Download</button>
                    <button type="button" class="btn-success" onclick="saveImageChanges()">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allImages = [];
        let currentEditId = null;

        // Initialize dashboard
        async function initDashboard() {
            await refreshDashboard();
        }

        // Refresh dashboard data
        async function refreshDashboard() {
            try {
                const [imagesRes, statsRes] = await Promise.all([
                    fetch('/api/images'),
                    fetch('/api/tracker/stats')
                ]);

                allImages = await imagesRes.json();
                const stats = await statsRes.json();

                updateStats(stats);
                renderImages(allImages);
                showAlert('Dashboard refreshed successfully', 'success');
            } catch (error) {
                showAlert('Error loading dashboard: ' + error.message, 'error');
            }
        }

        // Update statistics
        function updateStats(stats) {
            document.getElementById('totalImages').textContent = stats.total;
            document.getElementById('downloadedImages').textContent = stats.downloaded;
            document.getElementById('pendingImages').textContent = stats.pending;
            document.getElementById('totalSize').textContent = stats.totalSize;
        }

        // Render images
        function renderImages(images) {
            const container = document.getElementById('imagesList');

            if (images.length === 0) {
                container.innerHTML = `
                    <div class="no-images">
                        <h3>No images found</h3>
                        <p>Extract images from HTML or add them manually to get started.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `<div class="images-grid">${images.map(img => createImageCard(img)).join('')}</div>`;
        }

        // Create image card
        function createImageCard(image) {
            const statusClass = image.downloaded ? 'status-downloaded' : 'status-pending';
            const statusText = image.downloaded ? '✓ Downloaded' : '⏳ Pending';
            const previewUrl = image.localPath || image.srcUrl;
            const displayUrl = image.srcUrl.length > 50 ? image.srcUrl.substring(0, 47) + '...' : image.srcUrl;

            return `
                <div class="image-card">
                    <div class="image-preview ${image.downloaded ? '' : 'loading'}">
                        <img src="${previewUrl}" alt="Image preview" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2214%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Preview%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="image-info">
                        <span class="image-status ${statusClass}">${statusText}</span>
                        <div class="image-url">${displayUrl}</div>
                        <div class="image-description">${image.description || 'No description'}</div>
                        <div class="quality-control">
                            <label>Quality: <span class="quality-value">${image.quality}%</span></label>
                        </div>
                        <div class="image-actions">
                            <button class="btn-primary btn-small" onclick="editImage('${image.id}')">✎ Edit</button>
                            <button class="btn-danger btn-small" onclick="deleteImage('${image.id}')">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show extract modal
        function showExtractModal() {
            document.getElementById('extractModal').classList.add('show');
        }

        // Extract images from HTML
        async function extractImages() {
            const htmlFile = document.getElementById('htmlFile').value;
            if (!htmlFile) return;

            try {
                const resultDiv = document.getElementById('extractResult');
                resultDiv.innerHTML = '<div class="loading-spinner"></div> Extracting images...';

                const response = await fetch('/api/tracker/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ htmlFile })
                });

                const data = await response.json();

                if (data.images && data.images.length > 0) {
                    resultDiv.innerHTML = `
                        <div style="margin: 20px 0;">
                            <h3>Found ${data.count} images</h3>
                            <p>Click "Add to Database" to import these images</p>
                            <button class="btn-success" style="width: 100%; margin-top: 20px;" onclick="addExtractedImages('${htmlFile}')">
                                Add ${data.count} Images to Database
                            </button>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-info">No images found in this HTML file</div>';
                }
            } catch (error) {
                document.getElementById('extractResult').innerHTML = `<div class="alert alert-error">Error: ${error.message}</div>`;
            }
        }

        // Add extracted images
        async function addExtractedImages(htmlFile) {
            try {
                const response = await fetch('/api/tracker/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ htmlFile })
                });

                const data = await response.json();

                if (data.images) {
                    const addResponse = await fetch('/api/tracker/add-multiple', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ images: data.images })
                    });

                    const addData = await addResponse.json();
                    showAlert(`Added ${addData.added} images to database!`, 'success');
                    closeModal('extractModal');
                    await refreshDashboard();
                }
            } catch (error) {
                showAlert('Error adding images: ' + error.message, 'error');
            }
        }

        // Edit image
        async function editImage(id) {
            currentEditId = id;
            const image = allImages.find(img => img.id === id);
            if (!image) return;

            document.getElementById('editSrcUrl').value = image.srcUrl;
            document.getElementById('editDescription').value = image.description || '';
            document.getElementById('editQuality').value = image.quality;
            document.getElementById('qualityDisplay').textContent = image.quality;
            document.getElementById('previewImage').src = image.localPath || image.srcUrl;
            document.getElementById('downloadBtn').style.display = image.downloaded ? 'none' : 'block';

            document.getElementById('editModal').classList.add('show');
        }

        // Update quality display
        function updateQualityDisplay() {
            const quality = document.getElementById('editQuality').value;
            document.getElementById('qualityDisplay').textContent = quality;
        }

        // Download image
        async function downloadImage() {
            if (!currentEditId) return;

            try {
                const btn = document.getElementById('downloadBtn');
                btn.disabled = true;
                btn.textContent = 'Downloading...';

                const response = await fetch(`/api/images/${currentEditId}/download`, { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    showAlert('Image downloaded successfully!', 'success');
                    await refreshDashboard();
                    editImage(currentEditId);
                } else {
                    showAlert('Error downloading image', 'error');
                }

                btn.disabled = false;
                btn.textContent = 'Download';
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = 'Download';
            }
        }

        // Save image changes
        async function saveImageChanges() {
            if (!currentEditId) return;

            try {
                const quality = parseInt(document.getElementById('editQuality').value);
                const description = document.getElementById('editDescription').value;

                const response = await fetch(`/api/images/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quality, description })
                });

                const data = await response.json();
                showAlert('Image updated successfully!', 'success');
                await refreshDashboard();
                closeModal('editModal');
            } catch (error) {
                showAlert('Error updating image: ' + error.message, 'error');
            }
        }

        // Delete image
        async function deleteImage(id) {
            if (!confirm('Are you sure you want to delete this image?')) return;

            try {
                const response = await fetch(`/api/images/${id}`, { method: 'DELETE' });
                const data = await response.json();

                if (data.success) {
                    showAlert('Image deleted successfully!', 'success');
                    await refreshDashboard();
                }
            } catch (error) {
                showAlert('Error deleting image: ' + error.message, 'error');
            }
        }

        // Download all pending images
        async function downloadAllPending() {
            const pending = allImages.filter(img => !img.downloaded);
            if (pending.length === 0) {
                showAlert('No pending images to download', 'info');
                return;
            }

            showAlert(`Starting to download ${pending.length} images...`, 'info');

            for (let i = 0; i < pending.length; i++) {
                try {
                    await fetch(`/api/images/${pending[i].id}/download`, { method: 'POST' });
                    showAlert(`Downloaded ${i + 1}/${pending.length} images`, 'info');
                } catch (error) {
                    console.error(`Failed to download image ${pending[i].id}:`, error);
                }
            }

            showAlert('Download completed!', 'success');
            await refreshDashboard();
        }

        // Filter images
        function filterImages() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allImages.filter(img =>
                img.srcUrl.toLowerCase().includes(searchTerm) ||
                img.description.toLowerCase().includes(searchTerm)
            );
            renderImages(filtered);
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // Show alert
        function showAlert(message, type = 'info') {
            const alertsContainer = document.getElementById('alerts');
            const alertId = 'alert-' + Date.now();
            const alertHtml = `
                <div class="alert alert-${type}" id="${alertId}">
                    ${message}
                </div>
            `;
            alertsContainer.insertAdjacentHTML('beforeend', alertHtml);

            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) alert.remove();
            }, 5000);
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
